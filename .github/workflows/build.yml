name: Build Briks APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool libltdl-dev \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo-dev libffi-dev \
            libssl-dev cmake gettext m4 autopoint

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            flet \
            flet-camera \
            supabase \
            pandas \
            openpyxl \
            fpdf2 \
            httpx \
            postgrest

      - name: Build Android APK
        run: |
          echo "y" | flet build apk \
            --permissions camera \
            --android-permissions android.permission.CAMERA=true \
            --android-permissions android.permission.READ_EXTERNAL_STORAGE=true \
            --android-permissions android.permission.WRITE_EXTERNAL_STORAGE=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: briks-mobile-build
          path: build/apk/*.apk
