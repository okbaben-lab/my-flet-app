name: Build Briks Maintenance APK

on:
  push:
    branches:
      - main  # Runs every time you push code to the main branch
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pandas fpdf supabase openpyxl httpx postgrest

      - name: Setup Flutter (Required for Flet Build)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          # This command fixes the name and bundles the libraries
          flet build apk \
            --project-name "Briks By Okba" \
            --org "com.okba.briks" \
            --include-packages pandas,fpdf,supabase,openpyxl,httpx,postgrest

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Briks-Maintenance-App
          path: build/apk/*.apk
