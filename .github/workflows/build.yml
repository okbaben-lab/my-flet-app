name: Build Briks APK

on:
  push:
    branches: [ main ]
  pull_request: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1️⃣ Fix the "Final Boss" crash by installing these specific tools
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool libltdl-dev \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo-dev libffi-dev \
            libssl-dev cmake gettext m4 autopoint

      # 2️⃣ Install Flet and your project requirements
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet supabase pandas  # Add any other libs your app uses here

      # 3️⃣ Run the Flet Build with Permissions
      - name: Build Android APK
        run: |
          # Use the --android-permissions flag to add what you need
          flet build apk \
            --project "briks" \
            --product "briks" \
            --android-permissions "INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,MANAGE_EXTERNAL_STORAGE"

      # 4️⃣ Save the result
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: briks-mobile-build
          path: build/apk/*.apk
