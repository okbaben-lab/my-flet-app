name: Build Python APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo-dev \
            libffi-dev libssl-dev cmake gettext m4

      - name: Install Pip Dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install cython==0.29.33 buildozer virtualenv

      - name: Create and edit buildozer.spec
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
            sed -i 's/# android.permissions = INTERNET/android.permissions = INTERNET, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE/' buildozer.spec
            sed -i 's/# package.domain = org.test/package.domain = org.example/' buildozer.spec
            sed -i 's/# title = My Application/title = briks/' buildozer.spec
          fi

      - name: Build APK with Buildozer
        run: |
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Briks-Python-App
          path: '**/*.apk'
