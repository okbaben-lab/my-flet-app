name: Briks Maintenance APK Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet pandas openpyxl fpdf2 supabase

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Android APK
      run: |
        echo "y" | flet build apk --android-permissions "INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,MANAGE_EXTERNAL_STORAGE"

    - name: Locate APK (Debug)
      run: find . -name "*.apk"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Briks-Maintenance-APK
        path: '**/*.apk'
        if-no-files-found: error
