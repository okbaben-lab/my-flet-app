name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install Python dependencies
      - name: Install Dependencies
        run: |
          pip install flet pandas openpyxl fpdf supabase httpx postgrest

      # 4. Set up Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 5. Build APK
      - name: Build Android APK
        run: |
          flet build apk \
            --project-name "briks" \
            --permissions camera \
            --android-permissions INTERNET,MANAGE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE \
            --include-packages supabase,pandas,fpdf,openpyxl,httpx,postgrest

      # 6. Upload the APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: briks-app
          path: build/apk/*.apk
