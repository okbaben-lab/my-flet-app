name: Briks Maintenance APK Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet pandas openpyxl fpdf2 supabase

    - name: Set up Java (Required for Android Build)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0' # Stable version for Flet

    - name: Build Android APK with Permissions
      run: |
        flet build apk \
          --project "Briks Maintenance" \
          --product "Briks Maintenance" \
          --icon "icon.png" \
          --android-permissions "INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,MANAGE_EXTERNAL_STORAGE"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Briks-Maintenance-APK
        path: build/apk/*.apk
