name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install flet pandas openpyxl fpdf supabase httpx postgrest

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Android APK
        run: |
          echo "y" | flet build apk \
            --project-name "briks" \
            --permissions camera storage \
            --android-permissions android.permission.INTERNET=true android.permission.MANAGE_EXTERNAL_STORAGE=true \
            --include-packages supabase pandas fpdf openpyxl httpx postgrest

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: briks-app
          path: build/apk/*.apk
