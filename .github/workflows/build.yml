name: Build Briks APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1️⃣ Core compilation tools to prevent the "LT_SYS_SYMBOL_USCORE" crash
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool libltdl-dev \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo-dev libffi-dev \
            libssl-dev cmake gettext m4 autopoint

      # 2️⃣ Standard Flet dependencies
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet supabase pandas openpyxl fpdf2

      # 3️⃣ The Build command with your permissions
      - name: Build Android APK
        run: |
          flet build apk \
            --project "briks" \
            --product "briks" \
            --android-permissions "INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,MANAGE_EXTERNAL_STORAGE"

      # 4️⃣ Save the APK so you can download it
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: briks-mobile-build
          path: build/apk/*.apk
