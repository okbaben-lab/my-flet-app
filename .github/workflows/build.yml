name: Build Briks Maintenance APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet --upgrade
          # We install these here so the GitHub environment can prepare the "wheels"
          pip install pandas fpdf supabase openpyxl httpx postgrest

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          # Flet 0.82.2+ automatically uses requirements.txt and the assets/ folder
          flet build apk \
            --product "Briks By Okba" \
            --org "com.okba.briks"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Briks-Maintenance-App
          path: build/apk/*.apk
