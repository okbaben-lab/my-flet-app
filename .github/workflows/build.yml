name: Build Briks APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1️⃣ Core compilation tools 
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool libltdl-dev \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo-dev libffi-dev \
            libssl-dev cmake gettext m4 autopoint

      # 2️⃣ Install Flet CLI on the runner
      - name: Install Flet
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install flet

      # 3️⃣ NEW: Ensure requirements.txt exists for the Flet bundler
      - name: Prepare App Dependencies
        run: |
          if [ ! -f requirements.txt ]; then
            echo "Creating requirements.txt for Flet to bundle..."
            echo "supabase" >> requirements.txt
            echo "pandas" >> requirements.txt
            echo "openpyxl" >> requirements.txt
            echo "fpdf2" >> requirements.txt
            echo "httpx" >> requirements.txt
            echo "postgrest" >> requirements.txt
          else
            echo "requirements.txt already exists!"
          fi

      # 4️⃣ The Build command (Cleaned up)
      - name: Build Android APK
        run: |
          echo "y" | flet build apk \
            --project "briks" \
            --product "briks" \
            --permissions camera \
            --android-permissions android.permission.INTERNET android.permission.READ_EXTERNAL_STORAGE android.permission.WRITE_EXTERNAL_STORAGE android.permission.MANAGE_EXTERNAL_STORAGE \
            
      # 5️⃣ Save the APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: briks-mobile-build
          path: build/apk/*.apk
